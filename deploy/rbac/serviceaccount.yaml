# The identity MaKlaude authenticates as when it reads a cluster.
#
# This ServiceAccount carries no permissions on its own; all of its read access
# comes from the ClusterRoleBinding in this bundle, which grants it the
# maklaude-readonly ClusterRole. The operator turns this account into a
# kubeconfig (see docs/rbac.md) and registers that kubeconfig with MaKlaude.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: maklaude
  namespace: maklaude
  labels:
    app.kubernetes.io/name: maklaude
    app.kubernetes.io/component: rbac
# MaKlaude only ever reads; it never pulls images or runs workloads as this
# account, so no imagePullSecrets or automounting concerns apply here.
