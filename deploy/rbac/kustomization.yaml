# Apply the whole read-only RBAC bundle with:
#
#   kubectl apply -k deploy/rbac
#
# This creates the maklaude namespace, the maklaude ServiceAccount, the
# maklaude-readonly ClusterRole, and the ClusterRoleBinding that ties them
# together. See docs/rbac.md for the access model and how to wire the resulting
# identity into MaKlaude's cluster registry.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - clusterrole.yaml
  - clusterrolebinding.yaml
