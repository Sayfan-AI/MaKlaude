name: Genesis CI Failure Triage

# Wake-on-failure: when a required check fails on a PR, wake the orchestrator with
# the failure context so it can triage (re-run / fix / escalate) instead of leaving
# the PR stuck. Auto-merge only fires on CI *success*, so without this a failing PR
# just sits there until the human notices.

on:
  workflow_run:
    # NOTE: must enumerate the dev system's gating workflow names. MaKlaude gates on
    # "CI" and "E2E (kind)". (Genesis template should standardize this — see backlog.)
    workflows:
      - "CI"
      - "E2E (kind)"
    types: [completed]

concurrency:
  group: genesis-orchestrator-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  triage:
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.GENESIS_APP_ID }}
          private-key: ${{ secrets.GENESIS_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-workflows: write

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          allowed_bots: "genesis-dev-bot[bot]"
          prompt: |
            A required check failed on a pull request.
            - Failing workflow: ${{ github.event.workflow_run.name }}
            - Head branch: ${{ github.event.workflow_run.head_branch }}
            - Failed run: ${{ github.event.workflow_run.html_url }}

            Run the orchestrator agent in .claude/agents/orchestrator.md, focused on TRIAGE
            of this failure (see its "Handling failures" section):
            1. Find the PR for branch "${{ github.event.workflow_run.head_branch }}" and read the failing run's logs.
            2. Classify: transient/infra (re-run), a small well-understood defect (fix on the PR branch and push), or large/ambiguous.
            3. If you cannot fix it quickly and confidently within your turn budget, do NOT attempt a heroic inline fix. Escalate: comment a concise diagnosis on the PR's task issue, label it needs:human, and stop. Do not loop.
          claude_args: "--max-turns 30 --allowedTools Read,Write,Edit,Bash,Glob,Grep,Agent"

      # Escalate a real triage-run failure to a human (only on job failure).
      - name: Escalate on failure
        if: failure()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WF_NAME: ${{ github.workflow }}
        run: |
          set -euo pipefail
          existing=$(gh issue list --state open --label "automation:failure" --json number --jq '.[0].number // empty')
          body=$(printf 'A workflow run failed and the loop could not self-advance.\n\n- Workflow: **%s**\n- Failed run: %s\n\nLikely cause: the agent hit max-turns, an API error, or an unrecoverable task. Review the run, unblock, and close this issue once resolved.' "$WF_NAME" "$RUN_URL")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "Autonomous system needs help: a workflow run failed" --label "needs:human" --label "automation:failure" --body "$body"
          fi
