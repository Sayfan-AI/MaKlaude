name: Genesis Auto-Merge

# Trigger on the completion of EITHER gating workflow ("CI" fast + "E2E (kind)" slow),
# so whichever finishes LAST triggers a merge attempt. Listening only on "CI" was a trap:
# when CI finished first and fired this workflow, E2E was still pending so the merge was
# skipped; when E2E later went green NO event fired (it wasn't in the list), leaving the
# PR green-but-unmerged. This is safe because the merge agent independently verifies that
# ALL CI checks are passing before merging — triggering on either completion just
# guarantees a merge attempt happens after the last gate goes green, never on a red PR.

on:
  workflow_run:
    workflows: ["CI", "E2E (kind)"]
    types: [completed]

# Auto-merge gets its OWN group, NOT the orchestrator group. Sharing it meant a
# triage/orchestrator run already in the group would starve and cancel the
# Auto-Merge run that fires on a green PR — leaving the PR green but unmerged and
# the milestone stalled. Merges only need to serialize among themselves; a merge
# (server-side squash) running alongside an orchestrator is harmless.
concurrency:
  group: genesis-merge-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  merge:
    runs-on: ubuntu-latest
    # Only run when CI succeeds on a PR
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.GENESIS_APP_ID }}
          private-key: ${{ secrets.GENESIS_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-workflows: write
          permission-actions: write

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          allowed_bots: "genesis-dev-bot[bot],dependabot[bot]"
          prompt: |
            CI just passed on a PR. Check if there are any open PRs created by genesis-dev-bot
            where all CI checks have passed. If so, merge them.

            Rules:
            - Only merge PRs created by genesis-dev-bot[bot]
            - All CI checks must be passing
            - Use squash merge
            - After merging, close the corresponding task issue if one exists
            Do NOT trigger any workflow yourself — a deterministic step after you handles that.
          claude_args: "--max-turns 15 --allowedTools Bash,Read,Glob,Grep"

      # Deterministic re-trigger: guarantees the orchestrator wakes even if the
      # merge agent above hit max-turns or errored. Runs regardless of outcome.
      # Needs actions:write (workflow_dispatch) + contents:read (ref resolution).
      - name: Re-trigger orchestrator
        if: always()
        run: gh workflow run genesis-orchestrator.yml --ref main
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
