name: Genesis Orchestrator (Scheduled)

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

# Serialize all orchestrator activity across triggers (events, schedule, merge)
# so two near-simultaneous triggers can't run two orchestrators and duplicate work.
concurrency:
  group: genesis-orchestrator-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.GENESIS_APP_ID }}
          private-key: ${{ secrets.GENESIS_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-workflows: write

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          allowed_bots: "genesis-dev-bot[bot]"
          prompt: |
            Run the orchestrator agent defined in .claude/agents/orchestrator.md.
            This is a scheduled run — assess project state and advance work.
          claude_args: "--max-turns 40 --allowedTools Read,Write,Edit,Bash,Glob,Grep,Agent"

      # Escalate a real run failure (e.g. agent hit max-turns) to a human. Runs
      # only on job failure — no separate watcher workflow, so it adds zero
      # skipped runs to the Actions tab; benign cancellations don't trigger it.
      - name: Escalate on failure
        if: failure()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WF_NAME: ${{ github.workflow }}
        run: |
          set -euo pipefail
          existing=$(gh issue list --state open --label "automation:failure" --json number --jq '.[0].number // empty')
          body=$(printf 'A workflow run failed and the loop could not self-advance.\n\n- Workflow: **%s**\n- Failed run: %s\n\nLikely cause: the agent hit max-turns, an API error, or an unrecoverable task. Review the run, unblock, and close this issue once resolved.' "$WF_NAME" "$RUN_URL")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "Autonomous system needs help: a workflow run failed" --label "needs:human" --label "automation:failure" --body "$body"
          fi
