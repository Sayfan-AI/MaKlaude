name: Genesis Orchestrator (Scheduled)

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

# Serialize all orchestrator activity across triggers (events, schedule, merge)
# so two near-simultaneous triggers can't run two orchestrators and duplicate work.
concurrency:
  group: genesis-orchestrator-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.GENESIS_APP_ID }}
          private-key: ${{ secrets.GENESIS_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-workflows: write

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          allowed_bots: "genesis-dev-bot[bot]"
          prompt: |
            Run the orchestrator agent defined in .claude/agents/orchestrator.md.
            This is a scheduled run — assess project state and advance work.
          claude_args: "--max-turns 40 --allowedTools Read,Write,Edit,Bash,Glob,Grep,Agent"

      # Escalate a real run failure (e.g. agent hit max-turns) to a human. Runs
      # only on job failure — no separate watcher workflow, so it adds zero
      # skipped runs to the Actions tab; benign cancellations don't trigger it.
      - name: Escalate on failure
        if: failure()
        run: bash .genesis/scripts/escalate.sh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          WF_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
