name: Genesis Evolver

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.GENESIS_APP_ID }}
          private-key: ${{ secrets.GENESIS_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-workflows: write

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          allowed_bots: "genesis-dev-bot[bot]"
          prompt: |
            Run the evolver agent defined in .claude/agents/evolver.md.
            This is a scheduled review cycle — review recent system behavior and apply improvements.
          # The evolver runs the broadest open-ended work of any agent: a full
          # system review (collect signals → classify → apply fixes → escalate →
          # curate memory) that also dispatches subagents via the Agent tool —
          # each of which consumes turns from this budget. 15 turns (tied with the
          # narrow merge agent for the lowest budget) was too tight and the run
          # hit max-turns daily (escalations on #38, Jun 22–24). 30 matches the
          # ci-failure tier, which has the same toolset and comparable scope.
          claude_args: "--max-turns 30 --allowedTools Read,Write,Edit,Bash,Glob,Grep,Agent"

      # Escalate a real run failure (e.g. agent hit max-turns) to a human. Without
      # this, an evolver failure is silent — nobody learns the self-improvement
      # loop has stopped. Mirrors the orchestrator/merge/events/ci-failure
      # workflows; shares the same dedup'd escalation issue via escalate.sh.
      - name: Escalate on failure
        if: failure()
        run: bash .genesis/scripts/escalate.sh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          WF_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
