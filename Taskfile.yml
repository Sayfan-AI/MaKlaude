# Taskfile for MaKlaude — https://taskfile.dev
#
# This project uses Task as its sole task runner. There is intentionally NO
# Makefile and `make` is never used anywhere in this repository.
#
# Run `task --list` to see available tasks.
version: "3"

vars:
  BIN_DIR: bin
  BINARY: maklaude
  PKG: ./cmd/maklaude
  GOLANGCI_LINT_VERSION: v1.64.8

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list
    silent: true

  tidy:
    desc: Tidy and verify go.mod / go.sum
    cmds:
      - go mod tidy
      - go mod verify

  build:
    desc: Build the maklaude binary into ./bin
    cmds:
      - go build -o {{.BIN_DIR}}/{{.BINARY}} {{.PKG}}

  test:
    desc: Run unit tests with race detector and coverage
    cmds:
      - go test -race -coverprofile=coverage.out ./...

  e2e:
    desc: |
      Run the end-to-end test against a live cluster. Requires a kind cluster
      seeded with the failure scenarios and these env vars:
        MAKLAUDE_E2E_KUBECONFIG  path to the read-only ServiceAccount kubeconfig
        MAKLAUDE_E2E_CONTEXT     context to select within that kubeconfig
        MAKLAUDE_E2E_AUDIT_LOG   (optional) apiserver audit log for corroboration
      MAKLAUDE_GITHUB_* MUST be unset so escalation stays an in-memory dry-run.
      This target only runs the Go test; the kind cluster + seeding is driven by
      the CI e2e job (see .github/workflows/e2e.yml).
    cmds:
      - go test -tags e2e -count=1 -v ./test/e2e/...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  fmt:
    desc: Format all Go source files
    cmds:
      - gofmt -w .

  fmt:check:
    desc: Fail if any Go source file is not gofmt-clean
    cmds:
      - |
        unformatted=$(gofmt -l .)
        if [ -n "$unformatted" ]; then
          echo "The following files are not gofmt-clean:"
          echo "$unformatted"
          exit 1
        fi

  lint:
    desc: Run golangci-lint (auto-installs the pinned version if missing)
    cmds:
      - |
        if ! command -v golangci-lint >/dev/null 2>&1; then
          echo "golangci-lint not found; running pinned version via 'go run'..."
          go run github.com/golangci/golangci-lint/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}} run ./...
        else
          golangci-lint run ./...
        fi

  ci:
    desc: Run the full quality gate (build + lint + test) — mirrors CI
    cmds:
      - task: build
      - task: fmt:check
      - task: vet
      - task: lint
      - task: test

  check:
    desc: Alias for the full quality gate
    cmds:
      - task: ci

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BIN_DIR}} coverage.out
